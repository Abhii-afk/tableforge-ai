services:
  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "5433:5432"
    environment:
      # Defaults match .env.example; override via .env (must match DB_* for the app)
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-wtc}
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: